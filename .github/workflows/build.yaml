name: Build C/C++ sources with CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select CMake build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
          - RelWithDebInfo
          - MinSizeRel

env:
  build_type: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download and install dependencies
      run: |
        .\install.ps1

    - name: Configure CMake
      run: |
        cmake -S . -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || env.BUILD_TYPE }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ github.event.inputs.build_type || env.BUILD_TYPE }}
